<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App - Lab 10</title>
    <link rel="stylesheet" href="./src/css/app.css">
</head>

<body class="wrapper">
    <header class="header">
        <div class="header__logo">
            <img src="./src/assets/flowers.png" alt="logo" class="header__logo-img">
        </div>

        <input type="checkbox" id="burger-toggle" class="header__burger-toggle">
        <label for="burger-toggle" class="header__burger-icon">
            <span></span>
        </label>

        <nav class="header__nav">
            <ul class="header__nav-list">
                <li class="header__nav-item">
                    <button type="button" class="header__nav-btn" data-target="browse-section">Browse People</button>
                </li>
                <li class="header__nav-item">
                    <button type="button" class="header__nav-btn" data-target="friends-section" id="friends-btn">Friends</button>
                </li>
                <li class="header__nav-item">
                    <button type="button" class="header__nav-btn" id="logout-btn">Logout</button>
                </li>
            </ul>
        </nav>
    </header>

    <main class="main">
        <section id="browse-section" class="users">
            <h2>All Users</h2>
            <div id="users-container" class="users__list"></div>
            
            <div id="users-pagination-controls" class="pagination hidden">
                <input id="users-previous" type="button" value="Previous" class="pagination__button">
                <span id="users-page" class="pagination__info"></span>
                <input id="users-next" type="button" value="Next" class="pagination__button">
            </div>
        </section>

        <section id="friends-section" class="friends hidden">
            <h2>Your Friends</h2>
            <div class="friends__filters">
                <input type="text" id="friendsSearchInput" class="friends__search"
                       placeholder="Search">

                <select id="friendsSortSelect" class="friends__sort-order">
                    <option value="">Sort by</option>
                    <option value="name">Name</option>
                    <option value="age">Age</option>
                </select>

            </div>
            <div id="friends-container" class="friends__list"></div>
            
            <div id="friends-pagination-controls" class="pagination hidden">
                <input id="friends-previous" type="button" value="Previous" class="pagination__button">
                <span id="friends-page" class="pagination__info"></span>
                <input id="friends-next" type="button" value="Next" class="pagination__button">
            </div>
        </section>
    </main>

    <script type="module" src="/src/js/app.js"></script>
</body>
</html>
