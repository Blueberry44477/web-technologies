<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header wrapper">
        <a href="#" class="header__logo"><img src="../assets/flowers.png" alt="logo" class="header__logo-img"></a>
        <div id="cart">
            <span class="total-price">Загальна вартість: <span id="total-price-value">0.00</span> ₴</span>
        </div>
    </header>

    <main class="main wrapper">
        <section class="controls">
            <div class="controls__group" id="filter-controls">
                <span class="controls__label">Фільтр:</span>
                <button class="btn btn--filter" data-category="">Всі</button>
                <button class="btn btn--filter" data-category="Електроніка">Електроніка</button>
                <button class="btn btn--filter" data-category="Одяг">Одяг</button>
                <button class="btn btn--filter" data-category="Їжа">Їжа</button>
            </div>
            
            <div class="controls__group" id="sort-controls">
                <span class="controls__label">Сортування:</span>
                <button class="btn btn--sort" data-sort="price">За ціною</button>
                <button class="btn btn--sort" data-sort="createdAt">За датою створення</button>
                <button class="btn btn--sort" data-sort="updatedAt">За датою оновлення</button>
                <button class="btn btn--sort" data-sort="">Скинути</button>
            </div>
        </section>

        <section class="catalog">
            <h1 class="catalog__title">Каталог товарів</h1>
            
            <div id="empty-state" class="empty-state hidden">
                Наразі список товарів пустий. Додайте новий товар.
            </div>

            <div id="product-list" class="product-list"></div>

            <button id="btn-add-product" class="btn btn--primary mt-20">Додати новий товар</button>
        </section>
    </main>

    <div id="modal" class="modal hidden">
        <div class="modal__content">
            <div class="modal__header">
                <h2 id="modal-title">Додати товар</h2>
                <button id="btn-close-modal" class="btn--close">&times;</button>
            </div>
            <form id="product-form" class="form">
                <input type="hidden" id="product-id">
                <div class="form__group">
                    <label for="product-name">Назва товару</label>
                    <input type="text" id="product-name" required minlength="2">
                </div>
                <div class="form__group">
                    <label for="product-price">Ціна (₴)</label>
                    <input type="number" id="product-price" required min="0.01" step="0.01">
                </div>
                <div class="form__group">
                    <label for="product-category">Категорія</label>
                    <select id="product-category" required>
                        <option value="" disabled selected>Оберіть категорію</option>
                        <option value="Електроніка">Електроніка</option>
                        <option value="Одяг">Одяг</option>
                        <option value="Їжа">Їжа</option>
                    </select>
                </div>
                <div class="form__group">
                    <label for="product-image">URL зображення</label>
                    <input type="url" id="product-image">
                </div>
                <button type="submit" class="btn btn--success">Зберегти</button>
            </form>
        </div>
    </div>

    <div id="snackbar" class="snackbar"></div>

    <script src="script.js"></script>
</body>
</html>
